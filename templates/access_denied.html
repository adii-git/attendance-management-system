{% extends 'base.html' %}
{% block title %}Access Denied{% endblock %}
{% block body %}
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;background:#f0f4ff;">
    <div style="text-align:center;background:white;padding:3rem;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,0.1);">
        <i class="fas fa-ban" style="font-size:4rem;color:#ef4444;margin-bottom:1rem;"></i>
        <h1 style="color:#1e293b;margin-bottom:.5rem;">Access Denied</h1>
        <p style="color:#64748b;margin-bottom:2rem;">You don't have permission to access this page.</p>
        <a href="{{ url_for('auth.dashboard_redirect') }}" style="background:#6366f1;color:white;padding:.75rem 1.5rem;border-radius:8px;text-decoration:none;">Go to Dashboard</a>
    </div>
</div>
{% endblock %}
